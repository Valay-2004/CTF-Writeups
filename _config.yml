title: "Valay's Writeups"
description: "Detailed walkthroughs for TryHackMe (THM) rooms, CTFs, and cybersecurity challenges. Practical guides, commands, and explanations."
url: "https://valay-2004.github.io/THM-Writeups"
baseurl: "/THM-Writeups" # Important for GitHub Pages if repo name != username.github.io
author: "Valay"
theme: jekyll-theme-cayman

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

sass:
  style: compressed

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter_opts:
    line_numbers: false
    default_lang: console # Helps for command-heavy writeups

# SEO & Social enhancements
twitter:
  username: ghost_valay # Add if you have one

social:
  name: Valay
  links:
    - https://github.com/valay-2004
    - https://x.com/ghost_valay
    - https://www.linkedin.com/in/valay2004/

# Optional: Better date format for writeups
future: true # If you want to schedule posts
